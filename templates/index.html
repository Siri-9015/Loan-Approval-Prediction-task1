<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Loan Approval Prediction</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
        }

        .card {
            background: white;
            padding: 30px 25px;
            border-radius: 14px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        h2 {
            text-align: center;
            margin-bottom: 22px;
            color: #4a4a8a;
            font-size: 22px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }

        input,
        select {
            width: 100%;
            padding: 9px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            border-color: #667eea;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .row .field {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            text-align: center;
            margin-top: 18px;
            font-size: 17px;
            font-weight: bold;
            color: #333;
            min-height: 24px;
        }

        .confidence {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🏦 Loan Approval Prediction</h2>

        <form action="/predict" method="POST">

            <div class="row">
                <div class="field">
                    <label>No. of Dependents</label>
                    <input type="number" name="no_of_dependents" placeholder="e.g. 2" min="0" max="10" required>
                </div>
                <div class="field">
                    <label>Loan Term (months)</label>
                    <input type="number" name="loan_term" placeholder="e.g. 12" min="1" required>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Education</label>
                    <select name="education" required>
                        <option value="" disabled selected>Select</option>
                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>
                    </select>
                </div>
                <div class="field">
                    <label>Self Employed?</label>
                    <select name="self_employed" required>
                        <option value="" disabled selected>Select</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>Annual Income (₹)</label>
                <input type="number" name="income_annum" placeholder="e.g. 600000" min="0" required>
            </div>

            <div class="field">
                <label>Loan Amount (₹)</label>
                <input type="number" name="loan_amount" placeholder="e.g. 2500000" min="0" required>
            </div>

            <div class="field">
                <label>CIBIL Score</label>
                <input type="number" name="cibil_score" placeholder="300 – 900" min="300" max="900" required>
            </div>

            <div class="row">
                <div class="field">
                    <label>Residential Assets (₹)</label>
                    <input type="number" name="residential_assets_value" placeholder="e.g. 300000" min="0" required>
                </div>
                <div class="field">
                    <label>Commercial Assets (₹)</label>
                    <input type="number" name="commercial_assets_value" placeholder="e.g. 0" min="0" required>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Luxury Assets (₹)</label>
                    <input type="number" name="luxury_assets_value" placeholder="e.g. 0" min="0" required>
                </div>
                <div class="field">
                    <label>Bank Asset Value (₹)</label>
                    <input type="number" name="bank_asset_value" placeholder="e.g. 5000" min="0" required>
                </div>
            </div>

            <button type="submit">🔍 Predict Loan Status</button>
        </form>

        {% if prediction_text %}
        <div class="result">{{ prediction_text }}</div>
        {% endif %}
        {% if confidence %}
        <div class="confidence">Confidence: {{ confidence }}</div>
        {% endif %}
    </div>
</body>

</html>
